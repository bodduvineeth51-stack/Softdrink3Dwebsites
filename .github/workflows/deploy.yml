name: Deploy to GitHub Pages

on:
  push:
    branches: [main]       # runs on every push to main
  workflow_dispatch:        # also allows manual trigger from the Actions tab

# Grant the GITHUB_TOKEN the minimum permissions needed for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one deployment at a time; don't cancel in-flight runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── 1. Build ─────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Detects the Pages base URL (e.g. /ridoy-beverage/) automatically
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4
        id: pages

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Tells Vite what base path to use for asset URLs
          VITE_BASE: ${{ steps.pages.outputs.base_path }}
          # Firebase — add these in: Settings → Secrets → Actions
          VITE_FIREBASE_API_KEY:            ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:        ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:         ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:     ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:             ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist   # the Vite build output folder

  # ── 2. Deploy ────────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
